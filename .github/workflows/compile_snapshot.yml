name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      # Build all modules. The sidebar lib resolves from the public snapshots
      # repo declared in the root pom, so no auth / ci_settings.xml is needed.
      - name: Build with Maven
        run: mvn -B clean package -DskipTests
      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: bedwars-plugin
          path: bedwars-plugin/target/bedwars-plugin-*.jar
          if-no-files-found: error
